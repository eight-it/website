name: Update status ticker

on:
  schedule:
    # 15:00 UTC = 8am PDT / 7am PST
    - cron: '0 15 * * *'
    # 00:00 UTC = 5pm PDT / 4pm PST (the day before)
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh ticker items from RSS feeds
        run: node scripts/update-ticker.mjs

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "eight-it-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore(ticker): refresh feed items [skip ci]"
            git push
          else
            echo "No ticker changes — nothing to commit."
          fi
