<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle dot grid (decorative, top-right) -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="980" cy="80" r="3"/>
    <circle cx="1020" cy="80" r="3"/>
    <circle cx="1060" cy="80" r="3"/>
    <circle cx="1100" cy="80" r="3"/>
    <circle cx="1140" cy="80" r="3"/>
    <circle cx="980" cy="120" r="3"/>
    <circle cx="1020" cy="120" r="3"/>
    <circle cx="1060" cy="120" r="3"/>
    <circle cx="1100" cy="120" r="3"/>
    <circle cx="1140" cy="120" r="3"/>
    <circle cx="980" cy="160" r="3"/>
    <circle cx="1020" cy="160" r="3"/>
    <circle cx="1060" cy="160" r="3"/>
    <circle cx="1100" cy="160" r="3"/>
    <circle cx="1140" cy="160" r="3"/>
  </g>

  <!-- eyebrow -->
  <g transform="translate(80, 110)">
    <rect width="40" height="3" rx="1.5" y="10" fill="#bfdbfe"/>
    <text x="56" y="20" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="18" letter-spacing="2">TECHNOLOGY CONSULTANTS</text>
  </g>

  <!-- logo -->
  <text x="80" y="270" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" letter-spacing="-4">Eight<tspan fill="#93c5fd">IT</tspan></text>

  <!-- tagline -->
  <text x="80" y="380" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="54" letter-spacing="-1.5">Optimizing your Technology</text>
  <text x="80" y="450" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="54" letter-spacing="-1.5" opacity="0.75">Maximizing your Potential</text>

  <!-- footer URL -->
  <g transform="translate(80, 540)">
    <rect width="40" height="3" rx="1.5" y="10" fill="#bfdbfe" opacity="0.6"/>
    <text x="56" y="20" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="18" letter-spacing="1" opacity="0.9">EIGHTIT.COM</text>
  </g>
</svg>
