<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="82%" cy="22%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1a2e50" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- decorative brand-mark dots (⠋ pattern), upper-right, faint -->
  <circle cx="870"  cy="110" r="190" fill="#93c5fd" opacity="0.05"/>
  <circle cx="1110" cy="110" r="190" fill="#93c5fd" opacity="0.05"/>
  <circle cx="870"  cy="345" r="190" fill="#93c5fd" opacity="0.05"/>

  <!-- eyebrow -->
  <g transform="translate(80, 110)">
    <rect width="40" height="3" rx="1.5" y="10" fill="#bfdbfe"/>
    <text x="56" y="20" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="18" letter-spacing="2">TECHNOLOGY CONSULTANTS</text>
  </g>

  <!-- logo lockup: wordmarkSize=160, spinnerSize=147 (×0.92), wordmarkBaseline=290
       spinnerBaseline=277, dot r=10, col spacing=row spacing=44
       row 1 cy=179, row 2 cy=223, cx left=90, cx right=134 -->
  <circle cx="90"  cy="179" r="10" fill="#93c5fd"/>
  <circle cx="134" cy="179" r="10" fill="#93c5fd"/>
  <circle cx="90"  cy="223" r="10" fill="#93c5fd"/>

  <!-- wordmark -->
  <text x="158" y="290" fill="#f3f4f6" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="160" letter-spacing="-5">Eight<tspan fill="#93c5fd">IT</tspan></text>

  <!-- taglines -->
  <text x="80" y="400" fill="#f3f4f6" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="54" letter-spacing="-1.5">Optimizing your Technology</text>
  <text x="80" y="470" fill="#f3f4f6" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="54" letter-spacing="-1.5" opacity="0.6">Maximizing your Potential</text>

  <!-- footer -->
  <g transform="translate(80, 545)">
    <rect width="40" height="3" rx="1.5" y="10" fill="#bfdbfe" opacity="0.6"/>
    <text x="56" y="20" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="18" letter-spacing="1" opacity="0.9">EIGHTIT.COM</text>
  </g>
</svg>
